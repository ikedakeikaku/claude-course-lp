<style>
  :root {
    --bg-primary: #f7f4f0;
    --bg-warm: #eee9e0;
    --bg-white: #ffffff;
    --text-primary: #111010;
    --text-body: #2a2521;
    --text-secondary: #4d453c;
    --text-muted: #7a7168;
    --accent: #b45a1e;
    --border: rgba(17, 16, 16, 0.10);
    --border-strong: rgba(17, 16, 16, 0.18);
    --serif: 'Noto Serif JP', 'Georgia', serif;
    --sans: 'Noto Sans JP', 'Helvetica Neue', sans-serif;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; font-size: 17px; }

  body {
    font-family: var(--sans);
    background: var(--bg-primary);
    color: var(--text-body);
    line-height: 1.85;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
  }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 1.1rem 2.5rem;
    display: flex; justify-content: space-between; align-items: center;
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    background: rgba(247, 244, 240, 0.96);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo { font-family: var(--sans); font-weight: 600; font-size: 0.9rem; letter-spacing: 0.12em; color: var(--text-primary); text-decoration: none; }
  .nav-back { font-size: 0.8rem; color: var(--text-secondary); text-decoration: none; font-weight: 500; transition: color 0.2s; }
  .nav-back:hover { color: var(--text-primary); }

  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 7rem 2rem 4rem;
  }

  h1 {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 1.6rem;
    line-height: 1.5;
    color: var(--text-primary);
    margin-bottom: 2.5rem;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 2rem;
  }
  th, td {
    padding: 1rem 1.2rem;
    border-bottom: 1px solid var(--border);
    text-align: left;
    vertical-align: top;
    font-size: 0.95rem;
    line-height: 1.8;
  }
  th {
    width: 200px;
    font-weight: 600;
    color: var(--text-primary);
    background: var(--bg-warm);
    white-space: nowrap;
  }
  td {
    color: var(--text-secondary);
  }

  footer {
    padding: 2.5rem 2rem;
    border-top: 1px solid var(--border);
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .footer-brand { font-size: 0.78rem; color: var(--text-muted); letter-spacing: 0.08em; }
  .footer-links { display: flex; gap: 2rem; }
  .footer-links a { font-size: 0.75rem; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
  .footer-links a:hover { color: var(--text-secondary); }

  @media (max-width: 768px) {
    html { font-size: 16px; }
    nav { padding: 0.9rem 1.3rem; }
    main { padding: 6rem 1.3rem 3rem; }
    th { width: 120px; font-size: 0.85rem; }
    td { font-size: 0.9rem; }
    footer { flex-direction: column; text-align: center; }
  }
</style>
</head>
